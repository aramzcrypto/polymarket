environment: dev
log_level: INFO
trading:
  live_trading: false
  live_trading_acknowledged: false
  tiny_live_mode: true
  require_geoblock_ok: true
  require_balance_verified: true
  require_ws_connected: true
  cancel_all_on_startup: false
  cancel_all_on_shutdown: true
risk:
  max_notional_exposure_per_market: "25"
  max_total_account_exposure: "50"
  max_order_size: "5"
  max_daily_loss: "10"
  max_drawdown: "15"
  min_spread: "0.02"
strategies:
  conservative_mm:
    enabled: false
    markets: []
    token_ids: []
    min_spread: "0.03"
    quote_size: "2"
    max_quote_size: "5"
  btc_5m_late_convexity:
    enabled: true
    market_query: "Bitcoin Up or Down - 5 Minutes"
    bankroll: "50"
    min_spend_per_signal: "1.25"
    max_spend_per_signal: "3"
    max_spend_per_market: "9"
    max_quote_size: "25"
    min_longshot_price: "0.005"
    max_longshot_price: "0.35"
    min_reward_multiple: "2.75"
    min_edge: "0"
    high_confidence_probability: "0.06"
    entry_price_buffer_ticks: 1
    max_entry_price_buffer_bps: "2500"
    max_seconds_to_expiry: 120
    min_seconds_to_expiry: 6
    default_volatility_bps: "36"
    max_required_move_sigma: "2.25"
