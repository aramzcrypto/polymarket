environment: production
log_level: INFO
trading:
  live_trading: true
  live_trading_acknowledged: true
  tiny_live_mode: true
  tiny_live_max_order_size: "200"
  require_geoblock_ok: true
  require_balance_verified: true
  require_ws_connected: true
  cancel_all_on_startup: true
  cancel_all_on_shutdown: true
  post_only_quotes: true
risk:
  max_notional_exposure_per_market: "50"
  max_total_account_exposure: "150"
  max_order_size: "200"
  max_daily_loss: "25"
  max_drawdown: "50"
  max_inventory_imbalance: "20"
  max_open_orders_per_market: 4
  stale_book_seconds: 5
  max_slippage_bps: "2500"
  min_spread: "0.02"
  rejected_order_circuit_breaker: 20
  partial_fill_circuit_breaker: 20
strategies:
  conservative_mm:
    enabled: false
    markets: []
    token_ids: []
    min_spread: "0.03"
    quote_size: "5"
    max_quote_size: "10"
  btc_5m_late_convexity:
    enabled: true
    market_query: "Bitcoin Up or Down - 5 Minutes"
    bankroll: "50"
    kelly_fraction: "0.06"
    min_spend_per_signal: "1.00"
    max_spend_per_signal: "1.00"
    max_spend_per_market: "5"
    max_quote_size: "2500"
    min_longshot_price: "0.001"
    max_longshot_price: "0.10"
    min_reward_multiple: "10.0"
    min_edge: "0"
    high_confidence_probability: "0.06"
    entry_price_buffer_ticks: 1
    max_entry_price_buffer_bps: "2500"
    max_seconds_to_expiry: 45
    min_seconds_to_expiry: 5
    default_volatility_bps: "36"
    max_required_move_sigma: "3.5"
  btc_5m_mean_reversion:
    enabled: false
    market_query: "Bitcoin Up or Down - 5 Minutes"
    quote_size: "2"
    max_quote_size: "10"
    min_edge: "0.01"
    max_seconds_to_expiry: 300
    min_seconds_to_expiry: 60
    default_volatility_bps: "36"
  btc_5m_momentum:
    enabled: false
    market_query: "Bitcoin Up or Down - 5 Minutes"
    bankroll: "50"
    kelly_fraction: "0.05"
    min_spend_per_signal: "1.25"
    max_spend_per_signal: "5.00"
    max_quote_size: "200"
    min_edge: "0.015"
    entry_price_buffer_ticks: 2
    max_seconds_to_expiry: 290
    min_seconds_to_expiry: 10
    default_volatility_bps: "36"
